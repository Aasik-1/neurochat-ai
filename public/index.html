<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NeuroChat AI</title>
<link rel="icon" type="image/png" href="/image or icon/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="chat.css"/>
</head>
<body>

<div class="orbs">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
</div>
<div class="grid-bg"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 36 36" fill="none" width="22" height="22">
          <ellipse cx="18" cy="13" rx="9" ry="7" fill="none" stroke="white" stroke-width="1.4"/>
          <path d="M11 11 Q9 9 10 7 Q11 5.5 13 6.5" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M25 11 Q27 9 26 7 Q25 5.5 23 6.5" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M14 9.5 Q18 7.5 22 9.5" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M11 20 H25 Q26.5 20 26.5 21.5 V25 Q26.5 26.5 25 26.5 H18.5 L15 29 L16 26.5 H11 Q9.5 26.5 9.5 25 V21.5 Q9.5 20 11 20Z" fill="rgba(255,255,255,0.12)" stroke="white" stroke-width="1.1"/>
          <circle cx="14" cy="23.5" r="1" fill="white"/><circle cx="18" cy="23.5" r="1" fill="white"/><circle cx="22" cy="23.5" r="1" fill="white"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">NeuroChat AI</div>
        <div class="logo-tag">Think Smart. Chat Smarter.</div>
      </div>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>

    <div class="sb-label">CONVERSATIONS</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No conversations yet. Start chatting!</div>
    </div>
  </div>

  <div class="sb-bottom">
    <div class="user-card" id="userCard">
      <div class="user-av" id="userAv">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-email" id="userEmail">...</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- Mobile toggle -->
<button class="mob-toggle" id="mobToggle">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- MAIN -->
<main class="chat-main">

  <!-- Welcome -->
  <div class="welcome" id="welcome">
    <div class="w-logo-wrap">
      <div class="w-logo-ring"></div>
      <div class="w-logo-inner">
        <svg viewBox="0 0 48 48" fill="none" width="36" height="36">
          <ellipse cx="24" cy="18" rx="13" ry="10" fill="none" stroke="white" stroke-width="1.6"/>
          <path d="M13 15 Q10 13 11 10 Q12.5 7.5 15 9" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M35 15 Q38 13 37 10 Q35.5 7.5 33 9" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M18 13 Q24 10 30 13" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M17 30 H31 Q33 30 33 32 V36 Q33 38 31 38 H26 L22 42 L23 38 H17 Q15 38 15 36 V32 Q15 30 17 30Z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.3"/>
          <circle cx="20" cy="34" r="1.4" fill="white"/><circle cx="24" cy="34" r="1.4" fill="white"/><circle cx="28" cy="34" r="1.4" fill="white"/>
        </svg>
      </div>
    </div>
    <h1 class="w-title">Hello, <span id="wName">there</span> 👋</h1>
    <p class="w-sub">I'm NeuroChat AI — your intelligent companion.<br/>Ask me anything to get started.</p>
    <div class="suggestion-grid">
      <button class="sug-card" onclick="useSuggestion(this)">
        <span class="sug-icon">💡</span>
        <span class="sug-text">Explain machine learning in simple terms</span>
      </button>
      <button class="sug-card" onclick="useSuggestion(this)">
        <span class="sug-icon">🐍</span>
        <span class="sug-text">Write a Python REST API with Flask</span>
      </button>
      <button class="sug-card" onclick="useSuggestion(this)">
        <span class="sug-icon">🚀</span>
        <span class="sug-text">Tips for 2nd year CS students at UoM</span>
      </button>
      <button class="sug-card" onclick="useSuggestion(this)">
        <span class="sug-icon">✍️</span>
        <span class="sug-text">Help me write a technical report</span>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-zone">
    <div class="input-box" id="inputBox">
      <textarea id="msgInput" placeholder="Ask NeuroChat AI anything..." rows="1"
        onkeydown="onMsgKey(event)" oninput="growInput(this)"></textarea>
      <div class="input-actions">
        <div class="char-count" id="charCount">0</div>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <p class="input-note">NeuroChat AI · Powered by Claude · UoM Project by Aasik</p>
  </div>

</main>

<div class="mob-overlay" id="mobOverlay" onclick="closeSidebar()"></div>

<script src="/js/chat.js"></script>
</body>
</html>
